<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>BCP Travel</title>
  <meta name="description" content="Vertrektijden en routes vanaf huis — Gaasperplas, Leerdamhof, Bijlmer ArenA">
  <meta name="theme-color" content="#0d0d0f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" href="icons/icon-192.png">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BCP">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="top-fade" aria-hidden="true"></div>
  <div id="pull-indicator" aria-hidden="true"><div class="spinner"></div></div>

  <main id="app">
    <div class="chassis">
      <span class="screw" aria-hidden="true"></span>
      <span class="screw" aria-hidden="true"></span>
      <span class="screw" aria-hidden="true"></span>
      <span class="screw" aria-hidden="true"></span>
      <div class="board-recess">

    <header>
      <div class="brand" aria-label="BCP Travel">
        <div class="brand-board">
          <span class="tile" data-letter="B"><span class="tile-half tile-bottom">B</span><span class="tile-half tile-top" aria-hidden="true">B</span></span>
          <span class="tile" data-letter="C"><span class="tile-half tile-bottom">C</span><span class="tile-half tile-top" aria-hidden="true">C</span></span>
          <span class="tile" data-letter="P"><span class="tile-half tile-bottom">P</span><span class="tile-half tile-top" aria-hidden="true">P</span></span>
        </div>
        <span class="brand-word">Travel</span>
      </div>
      <button id="refresh-btn" aria-label="Ververs" title="Ververs">&#8635;</button>
    </header>

    <!-- Destination search -->
    <section id="search">
      <div class="search-wrap">
        <span class="search-pin" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 22 C7 15 4 12 4 8 a8 8 0 1 1 16 0 c0 4 -3 7 -8 14 Z" fill="#ffc917"/><circle cx="12" cy="8" r="2.8" fill="#1c1b33"/></svg>
        </span>
        <input id="dest-input" type="text" placeholder="" aria-label="Bestemming"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               enterkeyhint="search">
        <div id="ghost" aria-hidden="true"><span class="flap-word">Where to?</span></div>
        <button id="clear-btn" aria-label="Wissen" hidden>&times;</button>
        <ul id="suggestions" hidden></ul>
      </div>
      <div id="quick" hidden>
        <div id="quick-chips"></div>
      </div>
      <div id="recents" hidden>
        <p class="recents-label">Recent</p>
        <div id="recent-chips"></div>
      </div>
    </section>

    <!-- Route results -->
    <section id="routes" hidden>
      <h2 id="routes-title"></h2>
      <div id="route-cards"></div>
    </section>

    <!-- Departure boards -->
    <section id="boards">
      <div class="board" id="board-metro">
        <div class="board-head">
          <span class="mode-tile" aria-label="Metro">
            <svg viewBox="0 0 52 44" aria-hidden="true">
              <path d="M6 42 L6 24 A20 17 0 0 1 46 24 L46 42 Z" fill="#0f0e1f"/>
              <rect x="13" y="10" width="26" height="28" rx="7" fill="#d6231d"/>
              <rect x="13" y="23" width="26" height="2.5" fill="#ffffff" opacity="0.22"/>
              <rect x="17" y="14" width="18" height="8" rx="3" fill="#11101f"/>
              <circle cx="19" cy="34" r="2.2" fill="#ffffff"/>
              <circle cx="33" cy="34" r="2.2" fill="#ffffff"/>
            </svg>
          </span>
          <div class="board-title">
            <h2>Gaasperplas</h2>
            <p class="board-sub">Metro &middot; richting Centraal &middot; <span class="walk">12 min lopen</span></p>
          </div>
          <a class="maps-link board-maps" href="https://www.google.com/maps/search/?api=1&amp;query=Station+Gaasperplas+Amsterdam" target="_blank" rel="noopener" aria-label="Op Google Maps" title="Op Google Maps"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L20 21 L12 16 L4 21 Z" fill="currentColor"/></svg></a>
        </div>
        <ul class="departures" data-empty="Geen vertrektijden gevonden"></ul>
      </div>

      <div class="board" id="board-bus">
        <div class="board-head">
          <span class="mode-tile" aria-label="Bus">
            <svg viewBox="0 0 52 44" aria-hidden="true">
              <rect x="6" y="12" width="40" height="20" rx="3" fill="#14a3a3"/>
              <rect x="9" y="15" width="30" height="8" rx="2" fill="#11101f"/>
              <line x1="16" y1="15" x2="16" y2="23" stroke="#14a3a3" stroke-width="1.5"/>
              <line x1="24" y1="15" x2="24" y2="23" stroke="#14a3a3" stroke-width="1.5"/>
              <line x1="32" y1="15" x2="32" y2="23" stroke="#14a3a3" stroke-width="1.5"/>
              <circle cx="43" cy="28" r="1.8" fill="#ffd34d"/>
              <circle cx="16" cy="33" r="4" fill="#11101f"/>
              <circle cx="36" cy="33" r="4" fill="#11101f"/>
              <circle cx="16" cy="33" r="1.6" fill="#14a3a3"/>
              <circle cx="36" cy="33" r="1.6" fill="#14a3a3"/>
            </svg>
          </span>
          <div class="board-title">
            <h2>Leerdamhof</h2>
            <p class="board-sub">Bus &middot; richting Stn. Bijlmer ArenA &middot; <span class="walk">7 min lopen</span></p>
          </div>
          <a class="maps-link board-maps" href="https://www.google.com/maps/search/?api=1&amp;query=Leerdamhof+Amsterdam" target="_blank" rel="noopener" aria-label="Op Google Maps" title="Op Google Maps"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L20 21 L12 16 L4 21 Z" fill="currentColor"/></svg></a>
        </div>
        <ul class="departures" data-empty="Geen vertrektijden gevonden"></ul>
      </div>

      <div class="board" id="board-train">
        <div class="board-head">
          <span class="mode-tile" aria-label="Trein">
            <svg viewBox="0 0 52 44" aria-hidden="true">
              <rect x="21" y="6" width="11" height="4" rx="2" fill="#ffc917"/>
              <rect x="13" y="10" width="26" height="28" rx="9" fill="#ffc917"/>
              <rect x="17" y="15" width="18" height="8" rx="4" fill="#11101f"/>
              <circle cx="19" cy="34" r="2.2" fill="#11101f"/>
              <circle cx="33" cy="34" r="2.2" fill="#11101f"/>
            </svg>
          </span>
          <div class="board-title">
            <h2>Bijlmer ArenA</h2>
            <p class="board-sub">Trein &middot; beide richtingen &middot; <span class="walk">15 min fietsen</span></p>
          </div>
          <a class="maps-link board-maps" href="https://www.google.com/maps/search/?api=1&amp;query=Station+Bijlmer+ArenA+Amsterdam" target="_blank" rel="noopener" aria-label="Op Google Maps" title="Op Google Maps"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L20 21 L12 16 L4 21 Z" fill="currentColor"/></svg></a>
        </div>
        <ul class="departures" data-empty="Geen treinen gevonden"></ul>
        <button class="board-expand" hidden aria-expanded="false">
          <span class="expand-label">Komend uur</span>
          <span class="expand-arrow" aria-hidden="true">&#9662;</span>
        </button>
      </div>

      <p id="boards-updated"></p>
    </section>

      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
